version: "3.8"

services:
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    command: mongod --bind_ip_all
    volumes:
      - mongodb_data:/data/db

  mongo-express:
    image: mongo-express:1.0.2-20
    container_name: mongo-express
    depends_on:
      - mongodb
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://admin:password@mongodb:27017/?authSource=admin
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin

  neo4j:
    image: neo4j:5.15
    container_name: neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s
  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    ports: [ "3100:3100" ]
    # koristimo default config iz image-a (nema mounta)
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monitoring

  promtail:
    image: grafana/promtail:2.9.0
    container_name: promtail
    depends_on: [ loki ]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./observability/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - monitoring

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--storage.tsdb.retention.time=200h"
      - "--web.enable-lifecycle"
    networks:
      - monitoring

  # Docker-stats exporter for container metrics (CPU, RAM, filesystem, network)
  docker-stats-exporter:
    image: wywywywy/docker_stats_exporter
    container_name: docker-stats-exporter
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "9487:9487" # Prometheus scrape endpoint
    networks:
      - monitoring

  # Node Exporter for host machine metrics (CPU, RAM, filesystem, network)
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"
    restart: unless-stopped
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports: [ "3030:3000" ] # Grafana na http://localhost:3030
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on: [ loki, prometheus ]
    volumes:
      - ./provisioning:/etc/grafana/provisioning:ro
    networks:
      - monitoring

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "16686:16686"  # Jaeger UI
      - "14268:14268"  # HTTP traces collector
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - monitoring

  gateway:
    build: ./gateway
    container_name: gateway
    ports:
      - "8088:8088"
    depends_on:
      - blog-service
      - stakeholders-service
      - tours-service
      - followers-service
      - payment-service
    environment:
      PORT: 8088
      FRONTEND_URL: "http://localhost:3001"
      BLOG_SERVICE_URL: "http://blog-service:3000"
      STAKEHOLDERS_SERVICE_URL: "http://stakeholders-service:4000"
      STAKEHOLDERS_GRPC_URL: "stakeholders-service:4001"
      TOURS_SERVICE_URL: "http://tours-service:5000"
      FOLLOWERS_SERVICE_URL: "http://followers-service:7000"
      TOURS_GRPC_URL: "tours-service:5001"
      PAYMENT_SERVICE_URL: "http://payment-service:6000"

  stakeholders-service:
    build: ./stakeholders-service
    container_name: stakeholders-service
    ports:
      - "4000:4000"
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=mongodb://admin:password@mongodb:27017
      - JWT_SECRET=mojSuperTajniJWT123

  blog-service:
    build: ./blog-service
    container_name: blog-service
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://admin:password@mongodb:27017
      - FOLLOWERS_SERVICE_URL=http://followers-service:7000

  tours-service:
    build: ./tours-service
    container_name: tours-service
    ports:
      - "5000:5000" # REST
      - "5001:5001" # gRPC
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=mongodb://admin:password@mongodb:27017
      - INTERNAL_SERVICE_KEY=soa-internal-service-secret-2025

  payment-service:
    build: ./payment-service
    container_name: payment-service
    ports:
      - "6000:6000"
    depends_on:
      - mongodb
      - stakeholders-service
      - tours-service
    environment:
      - MONGO_URI=mongodb://admin:password@mongodb:27017
      - STAKEHOLDERS_SERVICE_URL=http://stakeholders-service:4000
      - TOURS_SERVICE_URL=http://tours-service:5000
      - INTERNAL_SERVICE_KEY=soa-internal-service-secret-2025
      - JWT_SECRET=mojSuperTajniJWT123

  followers-service:
    build: ./followers-service
    container_name: followers-service
    ports:
      - "7000:7000"
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      - PORT=7000
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - JWT_SECRET=mojSuperTajniJWT123
      - GATEWAY_URL=http://gateway:8088
      - JAEGER_ENDPOINT=http://jaeger:14268/api/traces
    networks:
      - default
      - monitoring

volumes:
  mongodb_data:
  neo4j_data:


networks:
  monitoring:
    name: monitoring
