version: "3.8"

services:
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    command: mongod --bind_ip_all
    volumes:
      - mongodb_data:/data/db

  mongo-express:
    image: mongo-express:1.0.2-20
    container_name: mongo-express
    depends_on:
      - mongodb
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://admin:password@mongodb:27017/?authSource=admin
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin

  gateway:
    build: ./gateway
    container_name: gateway
    ports:
      - "8088:8088"
    depends_on:
      - blog-service
      - stakeholders-service
      - tours-service
    environment:
      PORT: 8088
      FRONTEND_URL: "http://localhost:3001"
      BLOG_SERVICE_URL: "http://blog-service:3000"
      STAKEHOLDERS_SERVICE_URL: "http://stakeholders-service:4000"
      TOURS_SERVICE_URL: "http://tours-service:5000"

  stakeholders-service:
    build: ./stakeholders-service
    container_name: stakeholders-service
    ports:
      - "4000:4000"
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=mongodb://admin:password@mongodb:27017
      - JWT_SECRET=mojSuperTajniJWT123

  blog-service:
    build: ./blog-service
    container_name: blog-service
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://admin:password@mongodb:27017

  tours-service:
    build: ./tours-service
    container_name: tours-service
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=mongodb://admin:password@mongodb:27017

volumes:
  mongodb_data:
