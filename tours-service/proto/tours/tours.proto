syntax = "proto3";

package tours;

option go_package = "./proto/tours";

// Request za dobijanje svih tura - prazno za jednostavan GET /tours
message GetToursRequest {
  // Prazno - samo pozivamo GET /tours bez parametara
}

// Pojedinačna tura
message Tour {
  string id = 1;              // _id (ObjectId kao string)
  string name = 2;            // name
  string description = 3;     // description  
  string level = 4;           // level (ne difficulty)
  repeated string tags = 5;   // tags array
  string status = 6;          // status
  double price = 7;           // price
  int32 duration = 8;         // duration (ne duration_days)
  int32 max_people = 9;       // maxPeople
  string key_points = 10;     // keyPoints (nullable field)
  string guide_id = 11;       // guideId (ObjectId kao string)
  string created_at = 12;     // createdAt
  string updated_at = 13;     // updatedAt
}

// Response sa listom tura
message GetToursResponse {
  repeated Tour tours = 1;
  int32 total_count = 2;
  bool success = 3;
  string message = 4;
}

// Request za dobijanje ključnih tačaka po tour ID
message GetKeyPointsByTourRequest {
  string tour_id = 1; // tour ID kao string
}

// Pojedinačna ključna tačka
message KeyPoint {
  string id = 1;            // _id (ObjectId kao string)
  string tour_id = 2;       // tourId (ObjectId kao string)
  string name = 3;          // name
  string description = 4;   // description
  string image = 5;         // image path
  double longitude = 6;     // longitude
  double latitude = 7;      // latitude
}

// Response sa listom ključnih tačaka
message GetKeyPointsByTourResponse {
  repeated KeyPoint keypoints = 1;
  bool success = 2;
  string message = 3;
}

// Tours servis
service ToursService {
  rpc GetTours(GetToursRequest) returns (GetToursResponse);
  rpc GetKeyPointsByTour(GetKeyPointsByTourRequest) returns (GetKeyPointsByTourResponse);
}